- defaults:
    link:
      relink: true
      force: true
      create: true

- clean:
    '~':
    ~/.config:
      recursive: true

- create:
    ~/.ssh:
      mode: 0700
    ~/projects:

- shell:
  - git submodule update --init --recursive

- link:
    ~/.gitconfig:
      backup: true
    ~/.ssh/config:
      backup: true
    ~/.zshenv:
    ~/.zprofile:
    ~/.zshrc:
      backup: true
    ~/.zlogin:
    ~/.p10k.zsh:
    ~/.config/opencode:
      path: config/opencode
    ~/.config/wezterm:
      path: config/wezterm
