- defaults:
    create:
      mode: 0755
    link:
      backup: true
      relink: true
      force: true
      create: true

- clean:
    "~":
    ~/.agents:
    ~/.config:
    ~/.ssh:
    "~/Library/Application Support/Code/User":
    ~/Library/LaunchAgents:

- create:
    ~/.agents:
    ~/.ssh:
      mode: 0700
    ~/projects:

- shell:
    - command: git submodule update --init --recursive --remote
      description: Initialize, clone, and update all submodules (including nested ones) —

- link:
    # Files in $HOME root.
    ~/.Brewfile: home/.Brewfile
    ~/.gitconfig: home/.gitconfig
    ~/.gitconfig-parasiempre: home/.gitconfig-parasiempre
    ~/.zlogin: home/.zlogin
    ~/.zprofile: home/.zprofile
    ~/.zshenv: home/.zshenv
    ~/.zshrc: home/.zshrc

    # Files.
    ~/.agents/.skill-lock.json: home/.agents/.skill-lock.json
    ~/.aws/config: home/.aws/config
    ~/.ssh/config: home/.ssh/config
    "~/Library/Application Support/Code/User/settings.json":
      path: "home/.config/Code/User/settings.json"
      if: '[[ "$(uname)" == "Darwin" ]]'
    "~/.config/Code/User/settings.json":
      path: "home/.config/Code/User/settings.json"
      if: '[[ "$(uname)" == "Linux" ]]'

    # Directories.
    ~/.claude/:
      glob: true
      path: home/.claude/*
    ~/.config/ghostty: home/.config/ghostty/
    ~/.config/mise: home/.config/mise/
    ~/.config/opencode/:
      glob: true
      path: home/.config/opencode/*
    ~/.config/wezterm: home/.config/wezterm/

- shell:
    - command: ./scripts/install-os-packages.sh
      description: Install OS packages (Homebrew, Mise) —
      stdout: true
      stderr: true
