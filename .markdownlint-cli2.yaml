# Markdown lint configuration for portfolio project.
# gitignore: true automatically skips node_modules/, dist/, etc.
gitignore: true
ignores:
  - "dotbot/**"
  - "CLAUDE.md"
  # Verbatim upstream copy of Google's Shell Style Guide — kept unmodified, so
  # it is exempt from our Markdown style rules (like the vendored dotbot tree).
  - "home/.agents/skills/shell-scripting/references/google-shell-style-guide.md"
config:
  default: true
  # Italics uses underscores.
  emphasis-style:
    style: underscore
  # Bold uses asterisks.
  strong-style:
    style: asterisk
  # Unordered list markers must be dashes, consistent with Prettier's default.
  ul-style:
    style: dash
  # Line length matches .editorconfig max_line_length (100).
  # Tables and code blocks are excluded because they can't always be wrapped.
  line-length:
    line_length: 100
    code_blocks: false
    tables: false
